<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf4ff"/>
      <stop offset="100%" style="stop-color:#f5f3ff"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#9f7aea"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#7c3aed" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="480" height="300" fill="url(#bg)"/>
  <rect x="0" y="0" width="480" height="4" fill="url(#purple)"/>

  <!-- Map background tiles -->
  <rect x="16" y="50" width="290" height="200" rx="10" fill="white" stroke="#e9d5ff" stroke-width="1" filter="url(#s)"/>
  <!-- Stylised road network -->
  <line x1="80" y1="50" x2="80" y2="250" stroke="#e2e8f0" stroke-width="6"/>
  <line x1="180" y1="50" x2="180" y2="250" stroke="#e2e8f0" stroke-width="4"/>
  <line x1="16" y1="120" x2="306" y2="120" stroke="#e2e8f0" stroke-width="6"/>
  <line x1="16" y1="190" x2="306" y2="190" stroke="#e2e8f0" stroke-width="4"/>
  <line x1="120" y1="50" x2="260" y2="230" stroke="#f1f5f9" stroke-width="3"/>

  <!-- City blocks -->
  <rect x="30" y="60" width="40" height="50" rx="4" fill="#f1f5f9"/>
  <rect x="96" y="60" width="70" height="50" rx="4" fill="#f1f5f9"/>
  <rect x="196" y="60" width="96" height="50" rx="4" fill="#f1f5f9"/>
  <rect x="30" y="132" width="40" height="48" rx="4" fill="#f1f5f9"/>
  <rect x="96" y="132" width="70" height="48" rx="4" fill="#f1f5f9"/>
  <rect x="196" y="132" width="50" height="48" rx="4" fill="#f1f5f9"/>
  <rect x="258" y="132" width="38" height="48" rx="4" fill="#f1f5f9"/>
  <rect x="30" y="200" width="40" height="40" rx="4" fill="#f1f5f9"/>
  <rect x="96" y="200" width="70" height="40" rx="4" fill="#f1f5f9"/>
  <rect x="196" y="200" width="96" height="40" rx="4" fill="#f1f5f9"/>

  <!-- Route path -->
  <polyline points="60,230 60,120 180,120 180,80 244,80" fill="none" stroke="url(#purple)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Animated dots on route -->
  <circle cx="60" cy="230" r="7" fill="#7c3aed" filter="url(#s)"/>
  <text x="60" y="233" text-anchor="middle" font-size="8" fill="white">A</text>
  <circle cx="60" cy="120" r="5" fill="#9f7aea" opacity="0.8"/>
  <circle cx="180" cy="120" r="5" fill="#9f7aea" opacity="0.8"/>
  <circle cx="180" cy="80" r="5" fill="#9f7aea" opacity="0.8"/>
  <circle cx="244" cy="80" r="7" fill="#1a56db" filter="url(#s)"/>
  <text x="244" y="83" text-anchor="middle" font-size="8" fill="white">B</text>

  <!-- Truck icon on route -->
  <g transform="translate(112,108)">
    <rect x="0" y="0" width="28" height="16" rx="3" fill="#7c3aed"/>
    <rect x="20" y="-4" width="12" height="12" rx="2" fill="#9f7aea"/>
    <circle cx="6" cy="16" r="4" fill="#1e293b"/>
    <circle cx="22" cy="16" r="4" fill="#1e293b"/>
    <circle cx="6" cy="16" r="2" fill="white"/>
    <circle cx="22" cy="16" r="2" fill="white"/>
  </g>

  <!-- Map label -->
  <text x="161" y="267" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="sans-serif">Real-time Tracking · WebSockets</text>

  <!-- Right panel -->
  <g filter="url(#s)">
    <rect x="316" y="50" width="148" height="200" rx="10" fill="white" stroke="#e9d5ff" stroke-width="1"/>
    <rect x="316" y="50" width="148" height="28" rx="10" fill="url(#purple)"/>
    <rect x="316" y="66" width="148" height="12" rx="0" fill="url(#purple)"/>
    <text x="390" y="68" text-anchor="middle" font-size="9" fill="white" font-family="sans-serif" font-weight="bold">Zast Dashboard</text>

    <!-- Stats -->
    <text x="326" y="96" font-size="8" fill="#94a3b8" font-family="sans-serif" font-weight="bold">BOOKINGS TODAY</text>
    <text x="326" y="111" font-size="20" fill="#7c3aed" font-family="Georgia,serif" font-weight="bold">1,284</text>
    <text x="400" y="108" font-size="10" fill="#059669" font-family="sans-serif">↑ 8%</text>

    <line x1="326" y1="118" x2="452" y2="118" stroke="#f1f5f9" stroke-width="1"/>

    <!-- Wallet -->
    <text x="326" y="132" font-size="8" fill="#94a3b8" font-family="sans-serif">Wallet Balance</text>
    <text x="326" y="145" font-size="13" fill="#1a56db" font-family="Georgia,serif" font-weight="bold">₹2,40,500</text>

    <!-- Status list -->
    <rect x="326" y="154" width="126" height="16" rx="4" fill="#ecfdf5"/>
    <circle cx="336" cy="162" r="4" fill="#059669"/>
    <text x="346" y="165" font-size="8" fill="#334155" font-family="sans-serif">In Transit: 342</text>

    <rect x="326" y="174" width="126" height="16" rx="4" fill="#fffbeb"/>
    <circle cx="336" cy="182" r="4" fill="#d97706"/>
    <text x="346" y="185" font-size="8" fill="#334155" font-family="sans-serif">Pending: 89</text>

    <rect x="326" y="194" width="126" height="16" rx="4" fill="#eff6ff"/>
    <circle cx="336" cy="202" r="4" fill="#1a56db"/>
    <text x="346" y="205" font-size="8" fill="#334155" font-family="sans-serif">Delivered: 853</text>

    <!-- Mini sparkline -->
    <polyline points="326,228 346,224 366,226 386,218 406,214 426,210 446,206" fill="none" stroke="url(#purple)" stroke-width="2" stroke-linecap="round"/>
    <text x="326" y="242" font-size="7.5" fill="#94a3b8" font-family="sans-serif">Django · React · DRF · Redis</text>
  </g>
</svg>
