<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf8"/>
      <stop offset="100%" style="stop-color:#e6f7f2"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f766e" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="480" height="300" fill="url(#bg)"/>
  <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#0f766e" opacity="0.07"/>
  </pattern>
  <rect width="480" height="300" fill="url(#dots)"/>
  <rect x="0" y="0" width="480" height="4" fill="url(#teal)"/>

  <!-- News feed cards on left -->
  <g filter="url(#s)">
    <rect x="16" y="20" width="200" height="260" rx="12" fill="white" stroke="#ccfbf1" stroke-width="1"/>
    <rect x="16" y="20" width="200" height="28" rx="12" fill="url(#teal)"/>
    <rect x="16" y="36" width="200" height="12" rx="0" fill="url(#teal)"/>
    <text x="116" y="38" text-anchor="middle" font-size="9" fill="white" font-family="sans-serif" font-weight="bold">News Intelligence Feed</text>

    <!-- Article 1 -->
    <rect x="26" y="56" width="180" height="52" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1"/>
    <text x="36" y="70" font-size="7.5" fill="#0f766e" font-family="sans-serif" font-weight="bold">TECHNOLOGY</text>
    <rect x="36" y="74" width="140" height="4" rx="2" fill="#0f766e" opacity="0.2"/>
    <rect x="36" y="82" width="120" height="4" rx="2" fill="#0f766e" opacity="0.12"/>
    <rect x="36" y="90" width="100" height="4" rx="2" fill="#0f766e" opacity="0.12"/>
    <rect x="148" y="68" width="48" height="14" rx="4" fill="#ccfbf1"/>
    <text x="172" y="78" text-anchor="middle" font-size="7" fill="#0f766e" font-family="sans-serif" font-weight="bold">+0.82</text>

    <!-- Article 2 -->
    <rect x="26" y="114" width="180" height="52" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="36" y="128" font-size="7.5" fill="#d97706" font-family="sans-serif" font-weight="bold">FINANCE</text>
    <rect x="36" y="132" width="130" height="4" rx="2" fill="#d97706" opacity="0.2"/>
    <rect x="36" y="140" width="115" height="4" rx="2" fill="#d97706" opacity="0.12"/>
    <rect x="36" y="148" width="90" height="4" rx="2" fill="#d97706" opacity="0.12"/>
    <rect x="148" y="126" width="48" height="14" rx="4" fill="#fef3c7"/>
    <text x="172" y="136" text-anchor="middle" font-size="7" fill="#d97706" font-family="sans-serif" font-weight="bold">-0.34</text>

    <!-- Article 3 -->
    <rect x="26" y="172" width="180" height="52" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="36" y="186" font-size="7.5" fill="#dc2626" font-family="sans-serif" font-weight="bold">POLITICS</text>
    <rect x="36" y="190" width="125" height="4" rx="2" fill="#dc2626" opacity="0.2"/>
    <rect x="36" y="198" width="105" height="4" rx="2" fill="#dc2626" opacity="0.12"/>
    <rect x="36" y="206" width="80" height="4" rx="2" fill="#dc2626" opacity="0.12"/>
    <rect x="148" y="184" width="48" height="14" rx="4" fill="#fee2e2"/>
    <text x="172" y="194" text-anchor="middle" font-size="7" fill="#dc2626" font-family="sans-serif" font-weight="bold">-0.71</text>

    <text x="116" y="262" text-anchor="middle" font-size="7.5" fill="#94a3b8" font-family="sans-serif">Neural Models · NLP Pipeline</text>
    <rect x="36" y="266" width="144" height="6" rx="3" fill="#f0fdfa"/>
    <rect x="36" y="266" width="86" height="6" rx="3" fill="url(#teal)"/>
  </g>

  <!-- Analytics panel -->
  <g filter="url(#s)">
    <rect x="230" y="20" width="234" height="260" rx="12" fill="white" stroke="#ccfbf1" stroke-width="1"/>
    <rect x="230" y="20" width="234" height="28" rx="12" fill="url(#blue)"/>
    <rect x="230" y="36" width="234" height="12" rx="0" fill="url(#blue)"/>
    <text x="347" y="38" text-anchor="middle" font-size="9" fill="white" font-family="sans-serif" font-weight="bold">Linguistic Intelligence API</text>

    <!-- Sentiment gauge -->
    <text x="242" y="64" font-size="8" fill="#334155" font-family="sans-serif" font-weight="bold">Overall Sentiment Score</text>
    <!-- Gauge arc -->
    <circle cx="347" cy="112" r="44" fill="none" stroke="#f1f5f9" stroke-width="14" stroke-dasharray="138 44"/>
    <circle cx="347" cy="112" r="44" fill="none" stroke="#fee2e2" stroke-width="14" stroke-dasharray="44 138"/>
    <circle cx="347" cy="112" r="44" fill="none" stroke="#fef9c3" stroke-width="14" stroke-dasharray="46 138" stroke-dashoffset="-44"/>
    <circle cx="347" cy="112" r="44" fill="none" stroke="#ccfbf1" stroke-width="14" stroke-dasharray="48 138" stroke-dashoffset="-90"/>
    <!-- Needle -->
    <line x1="347" y1="112" x2="347" y2="72" stroke="#0f766e" stroke-width="2.5" stroke-linecap="round" transform="rotate(30 347 112)"/>
    <circle cx="347" cy="112" r="6" fill="#0f766e"/>
    <text x="347" y="130" text-anchor="middle" font-size="16" fill="#0f766e" font-family="Georgia,serif" font-weight="bold">+0.43</text>
    <text x="347" y="142" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="sans-serif">Slightly Positive</text>

    <line x1="242" y1="158" x2="452" y2="158" stroke="#f1f5f9" stroke-width="1"/>

    <!-- API response preview -->
    <text x="242" y="172" font-size="8" fill="#334155" font-family="sans-serif" font-weight="bold">API Response (60ms)</text>
    <rect x="242" y="178" width="206" height="70" rx="6" fill="#0f172a"/>
    <text x="250" y="192" font-size="7" fill="#10b981" font-family="monospace">{"sentiment": 0.43,</text>
    <text x="250" y="203" font-size="7" fill="#60a5fa" font-family="monospace">  "topics": ["AI", "tech"],</text>
    <text x="250" y="214" font-size="7" fill="#a78bfa" font-family="monospace">  "entities": 12,</text>
    <text x="250" y="225" font-size="7" fill="#34d399" font-family="monospace">  "confidence": 0.91,</text>
    <text x="250" y="236" font-size="7" fill="#f59e0b" font-family="monospace">  "model": "neural-v3"}</text>

    <!-- Performance -->
    <rect x="242" y="256" width="206" height="18" rx="6" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1"/>
    <text x="345" y="268" text-anchor="middle" font-size="8" fill="#0f766e" font-family="sans-serif" font-weight="bold">⚡ 60% faster · 80% fewer slow queries</text>
  </g>
</svg>
