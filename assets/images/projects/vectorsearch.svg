<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff"/>
      <stop offset="100%" style="stop-color:#f3e8ff"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#7c3aed" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="480" height="300" fill="url(#bg)"/>
  <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#7c3aed" opacity="0.07"/>
  </pattern>
  <rect width="480" height="300" fill="url(#dots)"/>
  <rect x="0" y="0" width="480" height="4" fill="url(#purple)"/>

  <!-- Search bar -->
  <g filter="url(#s)">
    <rect x="80" y="30" width="320" height="42" rx="21" fill="white" stroke="#e9d5ff" stroke-width="1.5"/>
    <circle cx="106" cy="51" r="9" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <line x1="112" y1="57" x2="118" y2="63" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    <rect x="126" y="45" width="200" height="12" rx="6" fill="#f3e8ff"/>
    <text x="226" y="55" text-anchor="middle" font-size="10" fill="#7c3aed" font-family="Georgia,serif">semantic vector search query...</text>
    <rect x="350" y="37" width="38" height="28" rx="14" fill="url(#purple)"/>
    <text x="369" y="54" text-anchor="middle" font-size="9" fill="white" font-family="sans-serif" font-weight="bold">Go</text>
  </g>

  <!-- Vector space visualization (center) -->
  <!-- Axes -->
  <line x1="170" y1="240" x2="170" y2="95" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="190" x2="310" y2="190" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>

  <!-- Vector points -->
  <circle cx="200" cy="140" r="10" fill="url(#purple)" opacity="0.9" filter="url(#s)"/>
  <circle cx="230" cy="155" r="8" fill="url(#purple)" opacity="0.7"/>
  <circle cx="215" cy="170" r="7" fill="url(#purple)" opacity="0.6"/>
  <circle cx="195" cy="160" r="6" fill="#a78bfa" opacity="0.6"/>
  <circle cx="250" cy="135" r="6" fill="#a78bfa" opacity="0.5"/>

  <!-- Similarity rings around query point -->
  <circle cx="200" cy="140" r="22" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <circle cx="200" cy="140" r="40" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,3" opacity="0.2"/>
  <circle cx="200" cy="140" r="58" fill="none" stroke="#7c3aed" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.1"/>

  <!-- Distant points (different cluster) -->
  <circle cx="145" cy="220" r="6" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="160" cy="210" r="5" fill="#cbd5e1" opacity="0.6"/>
  <circle cx="135" cy="205" r="5" fill="#cbd5e1" opacity="0.5"/>
  <circle cx="285" cy="220" r="5" fill="#cbd5e1" opacity="0.5"/>
  <circle cx="270" cy="215" r="4" fill="#cbd5e1" opacity="0.4"/>

  <!-- Query label -->
  <rect x="204" y="126" width="42" height="14" rx="7" fill="url(#purple)"/>
  <text x="225" y="136" text-anchor="middle" font-size="8" fill="white" font-family="sans-serif" font-weight="bold">Query</text>

  <!-- Results panel (right) -->
  <g filter="url(#s)">
    <rect x="316" y="88" width="148" height="190" rx="10" fill="white" stroke="#e9d5ff" stroke-width="1"/>
    <rect x="316" y="88" width="148" height="28" rx="10" fill="url(#purple)"/>
    <rect x="316" y="104" width="148" height="12" rx="0" fill="url(#purple)"/>
    <text x="390" y="106" text-anchor="middle" font-size="9" fill="white" font-family="sans-serif" font-weight="bold">Top Results</text>

    <!-- Result items -->
    <rect x="326" y="126" width="128" height="36" rx="6" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
    <text x="334" y="138" font-size="8" fill="#7c3aed" font-family="sans-serif" font-weight="bold">#1 · 98.4% match</text>
    <rect x="334" y="143" width="80" height="3.5" rx="1.5" fill="#e9d5ff"/>
    <rect x="334" y="150" width="60" height="3.5" rx="1.5" fill="#e9d5ff"/>

    <rect x="326" y="168" width="128" height="36" rx="6" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
    <text x="334" y="180" font-size="8" fill="#7c3aed" font-family="sans-serif" font-weight="bold">#2 · 96.1% match</text>
    <rect x="334" y="185" width="75" height="3.5" rx="1.5" fill="#e9d5ff"/>
    <rect x="334" y="192" width="55" height="3.5" rx="1.5" fill="#e9d5ff"/>

    <rect x="326" y="210" width="128" height="36" rx="6" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
    <text x="334" y="222" font-size="8" fill="#7c3aed" font-family="sans-serif" font-weight="bold">#3 · 91.7% match</text>
    <rect x="334" y="227" width="70" height="3.5" rx="1.5" fill="#e9d5ff"/>
    <rect x="334" y="234" width="90" height="3.5" rx="1.5" fill="#e9d5ff"/>

    <!-- Latency badge -->
    <rect x="326" y="254" width="128" height="18" rx="6" fill="#ecfdf5"/>
    <text x="390" y="266" text-anchor="middle" font-size="9" fill="#059669" font-family="sans-serif" font-weight="bold">⚡ 87ms P99 latency</text>
  </g>

  <!-- Tech label -->
  <rect x="16" y="270" width="150" height="20" rx="6" fill="white" stroke="#e9d5ff" stroke-width="1"/>
  <text x="91" y="283" text-anchor="middle" font-size="9" fill="#7c3aed" font-family="Georgia,serif" font-weight="bold">Qdrant · ElasticSearch · ONNX</text>
</svg>
