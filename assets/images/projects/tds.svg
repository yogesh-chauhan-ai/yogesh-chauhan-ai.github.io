<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffbf0"/>
      <stop offset="100%" style="stop-color:#fff8e8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#d97706" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="480" height="300" fill="url(#bg)"/>
  <pattern id="lines" width="20" height="20" patternUnits="userSpaceOnUse">
    <line x1="0" y1="20" x2="20" y2="0" stroke="#d97706" stroke-width="0.3" opacity="0.1"/>
  </pattern>
  <rect width="480" height="300" fill="url(#lines)"/>
  <rect x="0" y="0" width="480" height="4" fill="url(#gold)"/>

  <!-- Header bar -->
  <rect x="16" y="14" width="448" height="32" rx="8" fill="white" stroke="#fde68a" stroke-width="1" filter="url(#s)"/>
  <text x="30" y="26" font-size="9" fill="#92400e" font-family="sans-serif" font-weight="bold">TDS RECONCILIATION ENGINE</text>
  <text x="30" y="38" font-size="8" fill="#94a3b8" font-family="sans-serif">Multinational · Daily Processing · PySpark</text>
  <rect x="380" y="19" width="72" height="20" rx="10" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="416" y="32" text-anchor="middle" font-size="8" fill="#059669" font-family="sans-serif" font-weight="bold">✓ Reconciled</text>

  <!-- Summary KPI row -->
  <g filter="url(#s)">
    <rect x="16" y="56" width="100" height="54" rx="8" fill="white" stroke="#fde68a" stroke-width="1"/>
    <text x="66" y="76" text-anchor="middle" font-size="16" fill="#d97706" font-family="Georgia,serif" font-weight="bold">₹4.2M</text>
    <text x="66" y="89" text-anchor="middle" font-size="7.5" fill="#94a3b8" font-family="sans-serif">Total Volume</text>
    <text x="66" y="101" text-anchor="middle" font-size="7.5" fill="#059669" font-family="sans-serif">Today</text>
  </g>
  <g filter="url(#s)">
    <rect x="124" y="56" width="100" height="54" rx="8" fill="white" stroke="#fde68a" stroke-width="1"/>
    <text x="174" y="76" text-anchor="middle" font-size="16" fill="#059669" font-family="Georgia,serif" font-weight="bold">98.7%</text>
    <text x="174" y="89" text-anchor="middle" font-size="7.5" fill="#94a3b8" font-family="sans-serif">Match Rate</text>
    <text x="174" y="101" text-anchor="middle" font-size="7.5" fill="#059669" font-family="sans-serif">↑ 0.4%</text>
  </g>
  <g filter="url(#s)">
    <rect x="232" y="56" width="100" height="54" rx="8" fill="white" stroke="#fde68a" stroke-width="1"/>
    <text x="282" y="76" text-anchor="middle" font-size="16" fill="#dc2626" font-family="Georgia,serif" font-weight="bold">43</text>
    <text x="282" y="89" text-anchor="middle" font-size="7.5" fill="#94a3b8" font-family="sans-serif">Discrepancies</text>
    <text x="282" y="101" text-anchor="middle" font-size="7.5" fill="#dc2626" font-family="sans-serif">↓ 18%</text>
  </g>
  <g filter="url(#s)">
    <rect x="340" y="56" width="124" height="54" rx="8" fill="white" stroke="#fde68a" stroke-width="1"/>
    <text x="402" y="76" text-anchor="middle" font-size="16" fill="#1a56db" font-family="Georgia,serif" font-weight="bold">2.1M</text>
    <text x="402" y="89" text-anchor="middle" font-size="7.5" fill="#94a3b8" font-family="sans-serif">Transactions</text>
    <text x="402" y="101" text-anchor="middle" font-size="7.5" fill="#059669" font-family="sans-serif">Processed Daily</text>
  </g>

  <!-- Reconciliation table -->
  <g filter="url(#s)">
    <rect x="16" y="120" width="282" height="162" rx="8" fill="white" stroke="#fde68a" stroke-width="1"/>
    <rect x="16" y="120" width="282" height="26" rx="8" fill="url(#gold)" opacity="0.15"/>
    <rect x="16" y="134" width="282" height="12" rx="0" fill="url(#gold)" opacity="0.15"/>
    <text x="26" y="136" font-size="8" fill="#92400e" font-family="sans-serif" font-weight="bold">Transaction ID</text>
    <text x="140" y="136" font-size="8" fill="#92400e" font-family="sans-serif" font-weight="bold">Expected</text>
    <text x="206" y="136" font-size="8" fill="#92400e" font-family="sans-serif" font-weight="bold">Actual</text>
    <text x="262" y="136" font-size="8" fill="#92400e" font-family="sans-serif" font-weight="bold">Status</text>

    <!-- Row 1 - matched -->
    <rect x="16" y="146" width="282" height="22" rx="0" fill="#f8fafc"/>
    <text x="26" y="160" font-size="7.5" fill="#475569" font-family="monospace">TXN-2024-00841</text>
    <text x="140" y="160" font-size="7.5" fill="#475569" font-family="sans-serif">₹12,450</text>
    <text x="206" y="160" font-size="7.5" fill="#475569" font-family="sans-serif">₹12,450</text>
    <rect x="258" y="151" width="34" height="14" rx="7" fill="#ecfdf5"/>
    <text x="275" y="161" text-anchor="middle" font-size="7" fill="#059669" font-family="sans-serif" font-weight="bold">✓ OK</text>

    <!-- Row 2 - matched -->
    <text x="26" y="182" font-size="7.5" fill="#475569" font-family="monospace">TXN-2024-00842</text>
    <text x="140" y="182" font-size="7.5" fill="#475569" font-family="sans-serif">₹8,200</text>
    <text x="206" y="182" font-size="7.5" fill="#475569" font-family="sans-serif">₹8,200</text>
    <rect x="258" y="173" width="34" height="14" rx="7" fill="#ecfdf5"/>
    <text x="275" y="183" text-anchor="middle" font-size="7" fill="#059669" font-family="sans-serif" font-weight="bold">✓ OK</text>

    <!-- Row 3 - discrepancy -->
    <rect x="16" y="190" width="282" height="22" rx="0" fill="#fff5f5"/>
    <text x="26" y="204" font-size="7.5" fill="#475569" font-family="monospace">TXN-2024-00843</text>
    <text x="140" y="204" font-size="7.5" fill="#475569" font-family="sans-serif">₹34,100</text>
    <text x="206" y="204" font-size="7.5" fill="#dc2626" font-family="sans-serif" font-weight="bold">₹31,900</text>
    <rect x="254" y="195" width="40" height="14" rx="7" fill="#fef2f2"/>
    <text x="274" y="205" text-anchor="middle" font-size="7" fill="#dc2626" font-family="sans-serif" font-weight="bold">⚠ Flag</text>

    <!-- Row 4 - matched -->
    <text x="26" y="226" font-size="7.5" fill="#475569" font-family="monospace">TXN-2024-00844</text>
    <text x="140" y="226" font-size="7.5" fill="#475569" font-family="sans-serif">₹5,670</text>
    <text x="206" y="226" font-size="7.5" fill="#475569" font-family="sans-serif">₹5,670</text>
    <rect x="258" y="217" width="34" height="14" rx="7" fill="#ecfdf5"/>
    <text x="275" y="227" text-anchor="middle" font-size="7" fill="#059669" font-family="sans-serif" font-weight="bold">✓ OK</text>

    <!-- Row 5 -->
    <rect x="16" y="234" width="282" height="22" rx="0" fill="#f8fafc"/>
    <text x="26" y="248" font-size="7.5" fill="#475569" font-family="monospace">TXN-2024-00845</text>
    <text x="140" y="248" font-size="7.5" fill="#475569" font-family="sans-serif">₹19,800</text>
    <text x="206" y="248" font-size="7.5" fill="#475569" font-family="sans-serif">₹19,800</text>
    <rect x="258" y="239" width="34" height="14" rx="7" fill="#ecfdf5"/>
    <text x="275" y="249" text-anchor="middle" font-size="7" fill="#059669" font-family="sans-serif" font-weight="bold">✓ OK</text>

    <text x="26" y="274" font-size="7.5" fill="#94a3b8" font-family="sans-serif">Showing 5 of 2,100,000 transactions</text>
  </g>

  <!-- Power BI panel -->
  <g filter="url(#s)">
    <rect x="308" y="120" width="156" height="162" rx="8" fill="white" stroke="#fde68a" stroke-width="1"/>
    <rect x="308" y="120" width="156" height="24" rx="8" fill="#f59e0b" opacity="0.2"/>
    <rect x="308" y="132" width="156" height="12" rx="0" fill="#f59e0b" opacity="0.2"/>
    <text x="386" y="136" text-anchor="middle" font-size="8.5" fill="#92400e" font-family="sans-serif" font-weight="bold">Power BI Dashboard</text>

    <!-- Mini bar chart inside Power BI -->
    <rect x="320" y="154" width="16" height="40" rx="2" fill="#d97706" opacity="0.8"/>
    <rect x="342" y="165" width="16" height="29" rx="2" fill="#d97706" opacity="0.6"/>
    <rect x="364" y="148" width="16" height="46" rx="2" fill="#d97706" opacity="0.9"/>
    <rect x="386" y="160" width="16" height="34" rx="2" fill="#d97706" opacity="0.7"/>
    <rect x="408" y="155" width="16" height="39" rx="2" fill="#d97706" opacity="0.8"/>
    <rect x="430" y="170" width="16" height="24" rx="2" fill="#d97706" opacity="0.5"/>
    <line x1="318" y1="196" x2="450" y2="196" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Donut chart -->
    <circle cx="360" cy="232" r="22" fill="none" stroke="#e2e8f0" stroke-width="12"/>
    <circle cx="360" cy="232" r="22" fill="none" stroke="url(#green)" stroke-width="12" stroke-dasharray="87 13" stroke-dashoffset="0"/>
    <circle cx="360" cy="232" r="22" fill="none" stroke="url(#red)" stroke-width="12" stroke-dasharray="13 87" stroke-dashoffset="-87"/>
    <text x="360" y="236" text-anchor="middle" font-size="9" fill="#1e293b" font-family="Georgia,serif" font-weight="bold">98.7%</text>

    <text x="396" y="224" font-size="8" fill="#059669" font-family="sans-serif">● Matched</text>
    <text x="396" y="236" font-size="8" fill="#dc2626" font-family="sans-serif">● Flagged</text>
    <text x="396" y="248" font-size="8" fill="#94a3b8" font-family="sans-serif">● Pending</text>

    <rect x="318" y="262" width="128" height="14" rx="4" fill="#fffbeb"/>
    <text x="382" y="272" text-anchor="middle" font-size="7.5" fill="#d97706" font-family="sans-serif">PySpark · PostgreSQL · Flask</text>
  </g>
</svg>
