<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#ecfdf5"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#059669" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="480" height="300" fill="url(#bg)"/>
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#059669" stroke-width="0.3" opacity="0.2"/>
  </pattern>
  <rect width="480" height="300" fill="url(#grid)"/>
  <rect x="0" y="0" width="480" height="4" fill="url(#green)"/>

  <!-- Central orchestrator -->
  <g filter="url(#s)">
    <rect x="180" y="112" width="120" height="56" rx="12" fill="url(#green)"/>
    <text x="240" y="136" text-anchor="middle" font-size="9" fill="white" font-family="sans-serif" font-weight="bold" opacity="0.8">ORCHESTRATOR</text>
    <text x="240" y="150" text-anchor="middle" font-size="11" fill="white" font-family="Georgia,serif" font-weight="bold">LangGraph</text>
    <text x="240" y="162" text-anchor="middle" font-size="8" fill="white" font-family="sans-serif" opacity="0.8">State Machine</text>
  </g>

  <!-- Agent nodes -->
  <!-- Agent 1: Web Search -->
  <g filter="url(#s)">
    <rect x="28" y="40" width="106" height="60" rx="10" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
    <rect x="28" y="40" width="106" height="20" rx="10" fill="url(#green)" opacity="0.15"/>
    <rect x="28" y="50" width="106" height="10" rx="0" fill="url(#green)" opacity="0.15"/>
    <text x="81" y="54" text-anchor="middle" font-size="8" fill="#059669" font-family="sans-serif" font-weight="bold">🔍 Web Search</text>
    <rect x="38" y="68" width="70" height="4" rx="2" fill="#d1fae5"/>
    <rect x="38" y="76" width="55" height="4" rx="2" fill="#d1fae5"/>
    <rect x="38" y="84" width="64" height="4" rx="2" fill="#d1fae5"/>
  </g>

  <!-- Agent 2: Code Exec -->
  <g filter="url(#s)">
    <rect x="28" y="120" width="106" height="60" rx="10" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="81" y="135" text-anchor="middle" font-size="8" fill="#059669" font-family="sans-serif" font-weight="bold">⚙️ Code Runner</text>
    <rect x="38" y="140" width="86" height="30" rx="4" fill="#f0fdf4"/>
    <text x="43" y="152" font-size="7" fill="#059669" font-family="monospace">def execute():</text>
    <text x="43" y="162" font-size="7" fill="#059669" font-family="monospace">  return result</text>
  </g>

  <!-- Agent 3: Memory -->
  <g filter="url(#s)">
    <rect x="28" y="200" width="106" height="60" rx="10" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="81" y="215" text-anchor="middle" font-size="8" fill="#059669" font-family="sans-serif" font-weight="bold">🧠 Memory Agent</text>
    <rect x="38" y="222" width="72" height="4" rx="2" fill="#d1fae5"/>
    <rect x="38" y="230" width="60" height="4" rx="2" fill="#d1fae5"/>
    <rect x="38" y="238" width="80" height="4" rx="2" fill="#d1fae5"/>
    <rect x="38" y="246" width="50" height="4" rx="2" fill="#d1fae5"/>
  </g>

  <!-- Agent 4: API Call -->
  <g filter="url(#s)">
    <rect x="346" y="40" width="106" height="60" rx="10" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="399" y="55" text-anchor="middle" font-size="8" fill="#059669" font-family="sans-serif" font-weight="bold">🔗 API Agent</text>
    <rect x="356" y="62" width="86" height="28" rx="4" fill="#f0fdf4" stroke="#d1fae5" stroke-width="1"/>
    <text x="399" y="73" text-anchor="middle" font-size="7" fill="#0f766e" font-family="monospace">POST /api/v1</text>
    <text x="399" y="83" text-anchor="middle" font-size="7" fill="#059669" font-family="monospace">200 OK ✓</text>
  </g>

  <!-- Agent 5: Human Loop -->
  <g filter="url(#s)">
    <rect x="346" y="120" width="106" height="60" rx="10" fill="white" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="399" y="135" text-anchor="middle" font-size="8" fill="#d97706" font-family="sans-serif" font-weight="bold">👤 Human Gate</text>
    <rect x="356" y="142" width="86" height="28" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="399" y="153" text-anchor="middle" font-size="8" fill="#92400e" font-family="sans-serif">Awaiting approval</text>
    <text x="399" y="163" text-anchor="middle" font-size="10" fill="#d97706" font-family="sans-serif">⏳</text>
  </g>

  <!-- Agent 6: Output -->
  <g filter="url(#s)">
    <rect x="346" y="200" width="106" height="60" rx="10" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="399" y="215" text-anchor="middle" font-size="8" fill="#059669" font-family="sans-serif" font-weight="bold">📤 Output Agent</text>
    <rect x="356" y="222" width="86" height="28" rx="4" fill="#ecfdf5"/>
    <text x="399" y="235" text-anchor="middle" font-size="8" fill="#059669" font-family="sans-serif">Task Complete</text>
    <circle cx="399" cy="245" r="5" fill="#059669"/>
    <path d="M396 245 L398 247 L403 243" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Connection lines left -->
  <line x1="134" y1="68" x2="180" y2="132" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="134" y1="150" x2="180" y2="150" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="134" y1="228" x2="180" y2="165" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Connection lines right -->
  <line x1="300" y1="132" x2="346" y2="68" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="300" y1="150" x2="346" y2="150" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="300" y1="165" x2="346" y2="228" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Animated flow dots (static representation) -->
  <circle cx="157" cy="105" r="4" fill="#059669" opacity="0.8"/>
  <circle cx="323" cy="105" r="4" fill="#059669" opacity="0.8"/>
  <circle cx="157" cy="195" r="4" fill="#059669" opacity="0.6"/>
  <circle cx="323" cy="195" r="4" fill="#059669" opacity="0.6"/>

  <!-- Label -->
  <rect x="16" y="270" width="148" height="20" rx="6" fill="white" stroke="#d1fae5" stroke-width="1"/>
  <text x="90" y="283" text-anchor="middle" font-size="9" fill="#059669" font-family="Georgia,serif" font-weight="bold">LangGraph · Celery · PostgreSQL</text>
</svg>
