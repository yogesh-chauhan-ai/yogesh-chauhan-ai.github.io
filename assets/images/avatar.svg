<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2fff"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <!-- Body -->
  <ellipse cx="100" cy="155" rx="45" ry="30" fill="#1e3a5f"/>
  <!-- Head -->
  <circle cx="100" cy="85" r="38" fill="#f0c080"/>
  <!-- Hair -->
  <ellipse cx="100" cy="55" rx="38" ry="18" fill="#1a1008"/>
  <rect x="62" y="55" width="76" height="12" fill="#1a1008"/>
  <!-- Eyes -->
  <ellipse cx="86" cy="85" rx="6" ry="7" fill="white"/>
  <ellipse cx="114" cy="85" rx="6" ry="7" fill="white"/>
  <circle cx="87" cy="86" r="4" fill="#1a1008"/>
  <circle cx="115" cy="86" r="4" fill="#1a1008"/>
  <circle cx="88" cy="84" r="1.5" fill="white"/>
  <circle cx="116" cy="84" r="1.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="100" cy="97" rx="3" ry="2" fill="#d4966a"/>
  <!-- Smile -->
  <path d="M 88 107 Q 100 116 112 107" stroke="#8B5E3C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Glasses -->
  <rect x="77" y="79" width="18" height="13" rx="4" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <rect x="105" y="79" width="18" height="13" rx="4" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <line x1="95" y1="85" x2="105" y2="85" stroke="url(#accent)" stroke-width="2"/>
  <!-- Python logo hint on shirt -->
  <text x="100" y="160" text-anchor="middle" font-size="11" fill="url(#accent)" font-family="monospace" font-weight="bold">&lt;/Python&gt;</text>
</svg>
