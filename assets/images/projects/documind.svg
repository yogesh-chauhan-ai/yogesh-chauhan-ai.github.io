<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#e8eeff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1a56db" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="300" fill="url(#bg)"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#1a56db" opacity="0.08"/>
  </pattern>
  <rect width="480" height="300" fill="url(#dots)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="480" height="4" fill="url(#blue)"/>

  <!-- Document cards (left side) -->
  <g filter="url(#shadow)">
    <rect x="28" y="40" width="100" height="130" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="38" y="58" width="60" height="6" rx="3" fill="#1a56db" opacity="0.7"/>
    <rect x="38" y="72" width="72" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="38" y="82" width="60" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="38" y="92" width="68" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="38" y="102" width="50" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="38" y="118" width="72" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="38" y="128" width="58" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="38" y="138" width="65" height="4" rx="2" fill="#cbd5e1"/>
    <!-- doc icon -->
    <rect x="38" y="44" width="14" height="10" rx="2" fill="#1a56db" opacity="0.15"/>
    <path d="M40 47 L50 47 M40 50 L48 50" stroke="#1a56db" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Second doc card (offset) -->
  <g filter="url(#shadow)">
    <rect x="44" y="60" width="100" height="130" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- Third doc -->
  <g filter="url(#shadow)">
    <rect x="60" y="80" width="100" height="130" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Center brain/AI node -->
  <circle cx="240" cy="150" r="48" fill="url(#blue)" opacity="0.08"/>
  <circle cx="240" cy="150" r="36" fill="url(#blue)" opacity="0.12"/>
  <circle cx="240" cy="150" r="26" fill="url(#blue)" filter="url(#shadow)"/>

  <!-- Brain icon in center -->
  <path d="M232 142 Q228 138 230 134 Q234 130 238 134 Q240 130 244 130 Q250 130 250 136 Q254 136 254 142 Q256 146 252 148 Q252 154 248 154 Q246 158 242 156 Q240 158 238 156 Q234 158 232 154 Q228 154 228 148 Q226 146 228 142 Z" fill="white" opacity="0.9"/>
  <path d="M235 140 Q238 144 241 140 M235 147 L245 147" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Connection lines: docs to center -->
  <line x1="168" y1="120" x2="214" y2="145" stroke="#1a56db" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="168" y1="150" x2="214" y2="150" stroke="#1a56db" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Result panel (right side) -->
  <g filter="url(#shadow)">
    <rect x="300" y="50" width="155" height="200" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Header -->
    <rect x="300" y="50" width="155" height="36" rx="10" fill="url(#blue)"/>
    <rect x="300" y="68" width="155" height="18" rx="0" fill="url(#blue)"/>
    <text x="377" y="72" text-anchor="middle" font-size="10" fill="white" font-family="Georgia,serif" font-weight="bold">Query Result</text>

    <!-- Answer lines -->
    <rect x="314" y="98" width="90" height="5" rx="2.5" fill="#1a56db" opacity="0.7"/>
    <rect x="314" y="110" width="127" height="3.5" rx="1.5" fill="#cbd5e1"/>
    <rect x="314" y="120" width="118" height="3.5" rx="1.5" fill="#cbd5e1"/>
    <rect x="314" y="130" width="100" height="3.5" rx="1.5" fill="#cbd5e1"/>

    <!-- Source chips -->
    <rect x="314" y="148" width="38" height="16" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="333" y="159" text-anchor="middle" font-size="8" fill="#1a56db" font-family="sans-serif">Doc 1</text>
    <rect x="358" y="148" width="38" height="16" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="377" y="159" text-anchor="middle" font-size="8" fill="#1a56db" font-family="sans-serif">Doc 4</text>
    <rect x="402" y="148" width="38" height="16" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="421" y="159" text-anchor="middle" font-size="8" fill="#1a56db" font-family="sans-serif">Doc 7</text>

    <!-- Confidence bar -->
    <text x="314" y="188" font-size="8" fill="#94a3b8" font-family="sans-serif">Confidence</text>
    <rect x="314" y="193" width="127" height="5" rx="2.5" fill="#f1f5f9"/>
    <rect x="314" y="193" width="110" height="5" rx="2.5" fill="url(#blue)"/>
    <text x="448" y="198" font-size="8" fill="#1a56db" font-family="sans-serif" font-weight="bold">87%</text>

    <!-- Accuracy badge -->
    <rect x="314" y="215" width="127" height="22" rx="6" fill="#ecfdf5"/>
    <text x="377" y="229" text-anchor="middle" font-size="9" fill="#059669" font-family="sans-serif" font-weight="bold">✓ 87% Accuracy on Benchmarks</text>
  </g>

  <!-- Connection lines: center to result -->
  <line x1="266" y1="145" x2="300" y2="130" stroke="#1a56db" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="266" y1="155" x2="300" y2="165" stroke="#1a56db" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Floating vector nodes -->
  <circle cx="190" cy="80" r="6" fill="url(#purple)" opacity="0.7"/>
  <circle cx="210" cy="220" r="5" fill="url(#blue)" opacity="0.6"/>
  <circle cx="265" cy="90" r="4" fill="url(#purple)" opacity="0.5"/>

  <!-- Label -->
  <rect x="16" y="266" width="120" height="22" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="76" y="281" text-anchor="middle" font-size="9" fill="#1a56db" font-family="Georgia,serif" font-weight="bold">RAG · LangChain · Pinecone</text>
</svg>
